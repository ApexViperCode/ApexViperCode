name: Generate Pacman Contribution Graph

on:
  # يشتغل تلقائياً كل 24 ساعة
  schedule:
    - cron: "0 0 * * *"
  # يسمح لك بتشغيله يدوياً في أي وقت
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Generate Pacman SVG
        uses: abozanona/pacman-contribution-graph@v5.0.0
        with:
          github_user_name: ${{ github.repository_owner }}
          # يمكنك تغيير 'pacman' إلى 'bomberman' أو 'galaga' حسب الجدول الموجود في الصورة
          game_name: pacman 

      - name: Push SVG to Repository
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
